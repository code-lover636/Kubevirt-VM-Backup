# ============================================================
# 1. CRD — VMPVCBackup
# ============================================================
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: vmpvcbackups.backup.kubevirt.io
spec:
  group: backup.kubevirt.io
  names:
    kind: VMPVCBackup
    listKind: VMPVCBackupList
    plural: vmpvcbackups
    singular: vmpvcbackup
    shortNames: [vmpb]
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        required: [spec]
        properties:
          spec:
            type: object
            required: [vmName, backupName]
            properties:
              vmName:
                type: string
                description: Name of the VirtualMachine — PVCs and node are auto-discovered
              backupName:
                type: string
                description: Name to give the Velero backup
              veleroNamespace:
                type: string
                default: velero
                description: Namespace where Velero is installed
              osType:
                type: string
                enum: [linux, windows]
                default: linux
                description: OS type — determines reader pod image and mount paths
          status:
            type: object
            properties:
              phase:
                type: string
                enum: [Pending, CreatingPod, WaitingForPod, BackingUp, Completed, Failed]
              readerPodName:
                type: string
              targetNode:
                type: string
              veleroBackupName:
                type: string
              discoveredPVCs:
                type: string
              message:
                type: string
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Pod
      type: string
      jsonPath: .status.readerPodName
    - name: Node
      type: string
      jsonPath: .status.targetNode
    - name: PVCs
      type: string
      jsonPath: .status.discoveredPVCs
    - name: Backup
      type: string
      jsonPath: .status.veleroBackupName
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp

---
# ============================================================
# 2. RBAC
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vmb
  namespace: velero

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vmb
rules:
- apiGroups: [backup.kubevirt.io]
  resources: [vmpvcbackups]
  verbs: [get, list, watch]
- apiGroups: [backup.kubevirt.io]
  resources: [vmpvcbackups/status]
  verbs: [update, patch]
- apiGroups: [""]
  resources: [pods, persistentvolumeclaims, configmaps]
  verbs: [get, list, create, delete, watch]
- apiGroups: [kubevirt.io]
  resources: [virtualmachines, virtualmachineinstances]
  verbs: [get, list, patch]
- apiGroups: [cdi.kubevirt.io]
  resources: [datavolumes]
  verbs: [get, list]
- apiGroups: [velero.io]
  resources: [backups, restores, podvolumerestores]
  verbs: [get, list, watch, create]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vmb
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vmb
subjects:
- kind: ServiceAccount
  name: vmb
  namespace: velero

---
# ============================================================
# 3. Controller Script
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: vmb-script
  namespace: velero
data:
  controller.sh: |
    #!/bin/bash
    set -uo pipefail

    POLL_INTERVAL=20
    POD_READY_TIMEOUT=300
    RESTORE_PENDING_THRESHOLD=30

    log_info()  { echo "[$(date '+%Y-%m-%d %H:%M:%S')] [INFO]  $*"; }
    log_warn()  { echo "[$(date '+%Y-%m-%d %H:%M:%S')] [WARN]  $*"; }
    log_error() { echo "[$(date '+%Y-%m-%d %H:%M:%S')] [ERROR] $*"; }

    # ── Patch CR status ─────────────────────────────────────────
    patch_status() {
      local name=$1 ns=$2 phase=$3 msg=$4
      kubectl patch vmpvcbackup "$name" -n "$ns" \
        --subresource=status --type=merge \
        -p "{\"status\":{\"phase\":\"${phase}\",\"message\":\"${msg}\"}}" \
        2>/dev/null \
        || log_warn "[$name] Could not patch status to '$phase' — continuing"
    }

    # ── Discover PVCs from VM spec ──────────────────────────────
    discover_pvcs() {
      local vm_name=$1 ns=$2
      local pvc_vols dv_vols
      pvc_vols=$(kubectl get vm "$vm_name" -n "$ns" \
        -o jsonpath='{.spec.template.spec.volumes[*].persistentVolumeClaim.claimName}' 2>/dev/null || echo "")
      dv_vols=$(kubectl get vm "$vm_name" -n "$ns" \
        -o jsonpath='{.spec.template.spec.volumes[*].dataVolume.name}' 2>/dev/null || echo "")
      echo "$pvc_vols $dv_vols" | tr ' ' '\n' | grep -v '^$' | sort -u | tr '\n' ' '
    }

    # ── Discover node from virt-launcher pod ────────────────────
    discover_node() {
      local vm_name=$1 ns=$2
      kubectl get pods -n "$ns" \
        -l "vm.kubevirt.io/name=${vm_name}" \
        --field-selector=status.phase=Running \
        -o jsonpath='{.items[0].spec.nodeName}' 2>/dev/null
    }

    # ── Build backup.velero.io/backup-volumes annotation value ──
    build_backup_vols_annotation() {
      local pvcs=("$@") count=${#pvcs[@]} result="" i
      for ((i=1; i<=count; i++)); do
        result+="disk${i}"
        [[ $i -lt $count ]] && result+=","
      done
      echo "$result"
    }

    # ── Build volumeMounts block ─────────────────────────────────
    build_volume_mounts() {
      local os_type=$1; shift
      local pvcs=("$@") idx=1
      for _ in "${pvcs[@]}"; do
        if [[ "$os_type" == "windows" ]]; then
          echo "    - name: disk${idx}"
          echo "      mountPath: C:/data${idx}"
        else
          echo "    - name: disk${idx}"
          echo "      mountPath: /data${idx}"
        fi
        ((idx++))
      done
    }

    # ── Build volumes block ──────────────────────────────────────
    build_volumes() {
      local pvcs=("$@") idx=1
      for pvc in "${pvcs[@]}"; do
        echo "  - name: disk${idx}"
        echo "    persistentVolumeClaim:"
        echo "      claimName: ${pvc}"
        ((idx++))
      done
    }

    # ── Delete reader pod ────────────────────────────────────────
    delete_reader_pod() {
      local pod_name=$1 ns=$2 reason=$3
      if kubectl get pod "$pod_name" -n "$ns" &>/dev/null; then
        log_info "[$pod_name] Deleting reader pod (reason: $reason)"
        kubectl delete pod "$pod_name" -n "$ns" --ignore-not-found --wait=false 2>/dev/null \
          && log_info "[$pod_name] Reader pod deleted" \
          || log_warn "[$pod_name] Delete may have failed — will retry next cycle"
      fi
    }

    # ── Create reader pod with preferred nodeAffinity ────────────
    # Uses preferredDuringScheduling so the pod:
    #   - Lands on the correct node during BACKUP (RWO PVC co-location)
    #   - Can still schedule on ANY node during cross-cluster RESTORE
    create_reader_pod() {
      local pod_name=$1 ns=$2 os_type=$3 target_node=$4; shift 4
      local pvcs=("$@")

      if [[ -z "$target_node" ]]; then
        log_error "[$pod_name] target_node is empty — refusing to create reader pod"
        return 1
      fi

      local backup_vols
      backup_vols=$(build_backup_vols_annotation "${pvcs[@]}")

      local image cmd
      if [[ "$os_type" == "windows" ]]; then
        image="mcr.microsoft.com/windows/servercore:ltsc2022"
        cmd='["powershell", "-Command", "while ($true) { Start-Sleep -Seconds 3600 }"]'
      else
        image="ubuntu:22.04"
        cmd='["sleep", "infinity"]'
      fi

      local node_selector_block=""
      if [[ "$os_type" == "windows" ]]; then
        node_selector_block="  nodeSelector:
      kubernetes.io/os: windows"
      fi

      log_info "[$pod_name] Creating reader pod | preferred node=$target_node | pvcs=${pvcs[*]}"

      if ! kubectl apply -f - <<EOF
    apiVersion: v1
    kind: Pod
    metadata:
      name: ${pod_name}
      namespace: ${ns}
      labels:
        app: vmpvcbackup-reader
        vmpvcbackup-cr: "${pod_name}"
      annotations:
        backup.velero.io/backup-volumes: ${backup_vols}
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - "${target_node}"
    ${node_selector_block}
      containers:
      - name: explorer
        image: ${image}
        command: ${cmd}
        securityContext:
          privileged: $([ "$os_type" = "linux" ] && echo "true" || echo "false")
        volumeMounts:
    $(build_volume_mounts "$os_type" "${pvcs[@]}")
      volumes:
    $(build_volumes "${pvcs[@]}")
    EOF
      then
        log_error "[$pod_name] kubectl apply failed — verify PVCs exist: ${pvcs[*]}"
        return 1
      fi

      log_info "[$pod_name] Reader pod submitted (preferred node: '$target_node')"
    }

    # ── Wait for reader pod Running ──────────────────────────────
    wait_for_pod() {
      local pod_name=$1 ns=$2
      local elapsed=0
      log_info "[$pod_name] Waiting for pod Running (timeout ${POD_READY_TIMEOUT}s)..."
      while true; do
        local phase
        phase=$(kubectl get pod "$pod_name" -n "$ns" \
          -o jsonpath='{.status.phase}' 2>/dev/null || echo "Unknown")
        case "$phase" in
          Running)
            log_info "[$pod_name] Pod is Running"
            return 0
            ;;
          Failed|Error|CrashLoopBackOff)
            local reason
            reason=$(kubectl get pod "$pod_name" -n "$ns" \
              -o jsonpath='{.status.containerStatuses[0].state.terminated.reason}' \
              2>/dev/null || echo "unknown")
            log_error "[$pod_name] Pod entered terminal state '$phase' (reason: $reason)"
            return 1
            ;;
          *)
            if [[ $elapsed -ge $POD_READY_TIMEOUT ]]; then
              log_error "[$pod_name] Timed out after ${POD_READY_TIMEOUT}s (last phase: $phase)"
              return 1
            fi
            sleep 5; elapsed=$((elapsed+5))
            ;;
        esac
      done
    }

    # ── Verify reader pod is on the expected node ────────────────
    verify_pod_node() {
      local pod_name=$1 ns=$2 expected_node=$3
      local actual_node
      actual_node=$(kubectl get pod "$pod_name" -n "$ns" \
        -o jsonpath='{.spec.nodeName}' 2>/dev/null || echo "")
      if [[ "$actual_node" == "$expected_node" ]]; then
        log_info "[$pod_name] Confirmed on correct node '$expected_node'"
        return 0
      else
        log_warn "[$pod_name] Landed on '$actual_node' instead of '$expected_node' — proceeding (RWO PVC enforces co-location)"
        return 0
      fi
    }

    # ── Save VM YAML as ConfigMap for backup ─────────────────────
    # Instead of including virtualmachines resource in Velero backup
    # (which triggers kubevirt-velero-plugin "VM cannot be safely
    # backed up" error for running VMs), we export the VM definition
    # to a ConfigMap and include that in the backup instead.
    save_vm_yaml() {
      local vm_name=$1 ns=$2 cr_name=$3 pod_name=$4
      local cm_name="vm-backup-${cr_name}"

      log_info "[$cr_name] Saving VM '$vm_name' YAML to ConfigMap '$cm_name'"

      local vm_yaml
      vm_yaml=$(kubectl get vm "$vm_name" -n "$ns" -o yaml 2>/dev/null)
      if [[ -z "$vm_yaml" ]]; then
        log_warn "[$cr_name] Could not export VM '$vm_name' YAML"
        return 1
      fi

      kubectl create configmap "$cm_name" -n "$ns" \
        --from-literal=vm.yaml="$vm_yaml" \
        --dry-run=client -o yaml \
      | kubectl label --local -o yaml -f - \
          "vmpvcbackup-cr=${pod_name}" \
          "vmpvcbackup-vm-export=true" \
      | kubectl apply -f - 2>/dev/null \
        && log_info "[$cr_name] VM YAML saved to ConfigMap '$cm_name'" \
        || log_warn "[$cr_name] Could not create ConfigMap '$cm_name'"
    }

    # ── Clean up VM YAML ConfigMap after backup ──────────────────
    cleanup_vm_yaml() {
      local cr_name=$1 ns=$2
      local cm_name="vm-backup-${cr_name}"
      kubectl delete configmap "$cm_name" -n "$ns" --ignore-not-found 2>/dev/null \
        && log_info "[$cr_name] ConfigMap '$cm_name' cleaned up" \
        || true
    }

    # ── Trigger Velero backup ────────────────────────────────────
    trigger_velero_backup() {
      local backup_name=$1 ns=$2 pod_name=$3 cr_name=$4
      log_info "[$backup_name] Creating Velero Backup"

      if ! kubectl apply -f - <<EOF
    apiVersion: velero.io/v1
    kind: Backup
    metadata:
      name: ${backup_name}
      namespace: velero
    spec:
      includedNamespaces:
      - ${ns}
      includedResources:
      - namespaces
      - pods
      - persistentvolumeclaims
      - persistentvolumes
      - configmaps
      - datavolumes
      - virtualmachines
      - virtualmachineinstances
      orLabelSelectors:
      - matchLabels:
          vmpvcbackup-cr: "${pod_name}"
      defaultVolumesToFsBackup: true
      snapshotVolumes: false
    EOF
      then
        log_error "[$backup_name] kubectl apply failed — check velero namespace and RBAC"
        return 1
      fi

      log_info "[$backup_name] Velero Backup object created"
    }

    # ── Print Velero backup error details ────────────────────────
    print_velero_errors() {
      local backup_name=$1
      log_error "══════════════════════════════════════════════"
      log_error "VELERO BACKUP FAILURE: $backup_name"
      log_error "══════════════════════════════════════════════"

      local failure_reason
      failure_reason=$(kubectl get backup "$backup_name" -n velero \
        -o jsonpath='{.status.failureReason}' 2>/dev/null || echo "")
      [[ -n "$failure_reason" ]] && log_error "  Reason   : $failure_reason"

      log_error "  Warnings : $(kubectl get backup "$backup_name" -n velero \
        -o jsonpath='{.status.warnings}' 2>/dev/null || echo 0)"
      log_error "  Errors   : $(kubectl get backup "$backup_name" -n velero \
        -o jsonpath='{.status.errors}' 2>/dev/null || echo 0)"

      kubectl logs -n velero -l app.kubernetes.io/name=velero --tail=50 2>/dev/null \
        | grep -i "$backup_name" \
        | while IFS= read -r line; do log_error "    $line"; done

      log_error "══════════════════════════════════════════════"
    }

    # ── Orphan sweep ─────────────────────────────────────────────
    cleanup_orphaned_reader_pods() {
      local list
      list=$(kubectl get pods --all-namespaces \
        -l app=vmpvcbackup-reader \
        -o custom-columns=NS:.metadata.namespace,NAME:.metadata.name \
        --no-headers 2>/dev/null) || return 0
      [[ -z "$list" ]] && return 0

      while IFS= read -r line; do
        [[ -z "$line" ]] && continue
        local pod_ns pod_name cr_name cr_phase
        pod_ns=$(awk '{print $1}' <<< "$line")
        pod_name=$(awk '{print $2}' <<< "$line")
        cr_name="${pod_name#reader-}"
        cr_phase=$(kubectl get vmpvcbackup "$cr_name" -n "$pod_ns" \
          -o jsonpath='{.status.phase}' 2>/dev/null || echo "NotFound")
        if [[ "$cr_phase" == "Completed" || "$cr_phase" == "Failed" || "$cr_phase" == "NotFound" ]]; then
          log_warn "[$pod_name] Orphaned reader pod (CR '$cr_name' is '$cr_phase') — removing"
          delete_reader_pod "$pod_name" "$pod_ns" "orphaned — CR is '$cr_phase'"
        fi
      done <<< "$list"
    }

    # ════════════════════════════════════════════════════════════
    # RESTORE ASSIST — fix stuck reader pods during cross-cluster
    # restore. Detects Pending reader pods from restores where the
    # original node doesn't exist, and recreates them without any
    # node constraint so PodVolumeRestores can proceed.
    # ════════════════════════════════════════════════════════════
    fix_stuck_restore_pods() {
      local list
      list=$(kubectl get pods --all-namespaces \
        -l app=vmpvcbackup-reader \
        --field-selector=status.phase=Pending \
        -o custom-columns=NS:.metadata.namespace,NAME:.metadata.name,AGE:.metadata.creationTimestamp \
        --no-headers 2>/dev/null) || return 0
      [[ -z "$list" ]] && return 0

      while IFS= read -r line; do
        [[ -z "$line" ]] && continue
        local pod_ns pod_name created_at
        pod_ns=$(awk '{print $1}' <<< "$line")
        pod_name=$(awk '{print $2}' <<< "$line")
        created_at=$(awk '{print $3}' <<< "$line")

        local created_epoch now_epoch age_seconds
        created_epoch=$(date -d "$created_at" +%s 2>/dev/null || echo 0)
        now_epoch=$(date +%s)
        age_seconds=$((now_epoch - created_epoch))

        if [[ $age_seconds -lt $RESTORE_PENDING_THRESHOLD ]]; then
          continue
        fi

        # Only act on restored pods
        local has_restore_label
        has_restore_label=$(kubectl get pod "$pod_name" -n "$pod_ns" \
          -o jsonpath='{.metadata.labels.velero\.io/restore-name}' 2>/dev/null || echo "")
        if [[ -z "$has_restore_label" ]]; then
          continue
        fi

        # Only act on scheduling failures
        local pod_events
        pod_events=$(kubectl get events -n "$pod_ns" \
          --field-selector="involvedObject.name=${pod_name},reason=FailedScheduling" \
          --no-headers 2>/dev/null | head -1)
        if [[ -z "$pod_events" ]]; then
          continue
        fi

        log_warn "[$pod_name] Restore pod stuck Pending for ${age_seconds}s — recreating without node constraint"

        # Extract PVC names from the stuck pod
        local pvc_names
        pvc_names=$(kubectl get pod "$pod_name" -n "$pod_ns" \
          -o jsonpath='{range .spec.volumes[*]}{.persistentVolumeClaim.claimName}{"\n"}{end}' 2>/dev/null \
          | grep -v '^$')

        if [[ -z "$pvc_names" ]]; then
          log_warn "[$pod_name] No PVCs found on stuck pod — skipping"
          continue
        fi

        local pvcs=($pvc_names)
        local num_pvcs=${#pvcs[@]}
        local image
        image=$(kubectl get pod "$pod_name" -n "$pod_ns" \
          -o jsonpath='{.spec.containers[0].image}' 2>/dev/null || echo "ubuntu:22.04")

        # Build backup-volumes annotation
        local backup_vols=""
        for ((i=1; i<=num_pvcs; i++)); do
          backup_vols+="disk${i}"
          [[ $i -lt $num_pvcs ]] && backup_vols+=","
        done

        # Build volumeMounts YAML
        local vol_mounts=""
        for ((i=0; i<num_pvcs; i++)); do
          vol_mounts+="    - name: disk$((i+1))"$'\n'
          vol_mounts+="      mountPath: /data$((i+1))"$'\n'
        done

        # Build volumes YAML
        local vols=""
        for ((i=0; i<num_pvcs; i++)); do
          vols+="  - name: disk$((i+1))"$'\n'
          vols+="    persistentVolumeClaim:"$'\n'
          vols+="      claimName: ${pvcs[$i]}"$'\n'
        done

        # Delete and recreate without node constraint
        kubectl delete pod "$pod_name" -n "$pod_ns" --ignore-not-found --grace-period=0 --force 2>/dev/null
        sleep 3

        log_info "[$pod_name] Recreating reader pod without node constraint (PVCs: ${pvcs[*]})"
        kubectl apply -f - <<EOF
    apiVersion: v1
    kind: Pod
    metadata:
      name: ${pod_name}
      namespace: ${pod_ns}
      labels:
        app: vmpvcbackup-reader
        vmpvcbackup-cr: "${pod_name}"
        velero.io/restore-name: "${has_restore_label}"
      annotations:
        backup.velero.io/backup-volumes: ${backup_vols}
    spec:
      containers:
      - name: explorer
        image: ${image}
        command: ["sleep", "infinity"]
        volumeMounts:
    ${vol_mounts}
      volumes:
    ${vols}
    EOF

        if [[ $? -eq 0 ]]; then
          log_info "[$pod_name] Recreated — PodVolumeRestores should resume"
        else
          log_error "[$pod_name] Failed to recreate reader pod"
        fi

      done <<< "$list"
    }

    # ── Main reconcile ───────────────────────────────────────────
    reconcile() {
      local name=$1 ns=$2

      local current_phase
      current_phase=$(kubectl get vmpvcbackup "$name" -n "$ns" \
        -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
      [[ "$current_phase" == "Completed" || "$current_phase" == "Failed" ]] && return 0

      # ── Read spec ─────────────────────────────────────────────
      local os_type backup_name vm_name
      if ! vm_name=$(kubectl get vmpvcbackup "$name" -n "$ns" \
              -o jsonpath='{.spec.vmName}' 2>/dev/null) \
         || ! backup_name=$(kubectl get vmpvcbackup "$name" -n "$ns" \
              -o jsonpath='{.spec.backupName}' 2>/dev/null) \
         || ! os_type=$(kubectl get vmpvcbackup "$name" -n "$ns" \
              -o jsonpath='{.spec.osType}' 2>/dev/null); then
        log_error "[$name] Failed to read CR spec"
        patch_status "$name" "$ns" "Failed" "Could not read CR spec"
        return 1
      fi
      os_type=${os_type:-linux}

      # ── Verify VM exists ──────────────────────────────────────
      if ! kubectl get vm "$vm_name" -n "$ns" &>/dev/null; then
        log_error "[$name] VM '$vm_name' not found in namespace '$ns'"
        patch_status "$name" "$ns" "Failed" "VM '$vm_name' not found in namespace '$ns'"
        return 1
      fi

      # ── Discover PVCs from VM ─────────────────────────────────
      local pvcs_raw
      pvcs_raw=$(discover_pvcs "$vm_name" "$ns")
      local pvcs=($pvcs_raw)
      if [[ ${#pvcs[@]} -eq 0 ]]; then
        log_error "[$name] No PVCs found on VM '$vm_name'"
        patch_status "$name" "$ns" "Failed" "No PVCs found on VM '$vm_name'"
        return 1
      fi
      log_info "[$name] Discovered PVCs: ${pvcs[*]}"

      # ── Discover node from virt-launcher ──────────────────────
      local target_node
      target_node=$(discover_node "$vm_name" "$ns")
      if [[ -z "$target_node" ]]; then
        log_warn "[$name] VM '$vm_name' is not running — retrying next cycle"
        patch_status "$name" "$ns" "Pending" "Waiting for VM '$vm_name' to be running"
        return 0
      fi
      log_info "[$name] VM '$vm_name' is on node '$target_node'"

      local pod_name="reader-${name}"

      # ── Update status with discovered info ────────────────────
      kubectl patch vmpvcbackup "$name" -n "$ns" \
        --subresource=status --type=merge \
        -p "{\"status\":{\"readerPodName\":\"${pod_name}\",\"targetNode\":\"${target_node}\",\"veleroBackupName\":\"${backup_name}\",\"discoveredPVCs\":\"${pvcs[*]}\"}}" \
        2>/dev/null || true

      # ── Reuse or create reader pod ────────────────────────────
      local need_create=true
      if kubectl get pod "$pod_name" -n "$ns" &>/dev/null; then
        local existing_node existing_phase
        existing_node=$(kubectl get pod "$pod_name" -n "$ns" \
          -o jsonpath='{.spec.nodeName}' 2>/dev/null || echo "")
        existing_phase=$(kubectl get pod "$pod_name" -n "$ns" \
          -o jsonpath='{.status.phase}' 2>/dev/null || echo "Unknown")

        if [[ "$existing_node" != "$target_node" ]]; then
          log_warn "[$name] Reader pod on wrong node '$existing_node' (need '$target_node') — recreating"
          delete_reader_pod "$pod_name" "$ns" "wrong node"
          sleep 5
        elif [[ "$existing_phase" == "Running" ]]; then
          log_info "[$name] Reader pod already Running on '$target_node' — reusing"
          need_create=false
        elif [[ "$existing_phase" == "Failed" || "$existing_phase" == "Error" ]]; then
          log_warn "[$name] Reader pod in '$existing_phase' — recreating"
          delete_reader_pod "$pod_name" "$ns" "pod in $existing_phase"
          sleep 5
        else
          log_info "[$name] Reader pod exists (phase: $existing_phase) — waiting"
          need_create=false
        fi
      fi

      if [[ "$need_create" == "true" ]]; then
        patch_status "$name" "$ns" "CreatingPod" \
          "Creating reader pod on node '$target_node' with PVCs: ${pvcs[*]}"

        if ! create_reader_pod "$pod_name" "$ns" "$os_type" "$target_node" "${pvcs[@]}"; then
          patch_status "$name" "$ns" "Failed" \
            "Failed to create reader pod — verify PVCs: ${pvcs[*]}"
          return 1
        fi
      fi

      # ── Wait for pod Running ──────────────────────────────────
      patch_status "$name" "$ns" "WaitingForPod" "Waiting for reader pod on '$target_node'"
      if ! wait_for_pod "$pod_name" "$ns"; then
        log_error "[$name] Reader pod never reached Running"
        patch_status "$name" "$ns" "Failed" \
          "Reader pod stuck — run: kubectl describe pod $pod_name -n $ns"
        delete_reader_pod "$pod_name" "$ns" "pod failed to start"
        return 1
      fi

      # ── Verify pod node ───────────────────────────────────────
      verify_pod_node "$pod_name" "$ns" "$target_node"

      # ── Save VM YAML as ConfigMap ─────────────────────────────
      save_vm_yaml "$vm_name" "$ns" "$name" "$pod_name"

      # ── Trigger Velero backup ─────────────────────────────────
      if ! kubectl get backup "$backup_name" -n velero &>/dev/null; then
        patch_status "$name" "$ns" "BackingUp" "Velero backup '$backup_name' triggered"
        if ! trigger_velero_backup "$backup_name" "$ns" "$pod_name" "$name"; then
          cleanup_vm_yaml "$name" "$ns"
          delete_reader_pod "$pod_name" "$ns" "backup trigger failed"
          patch_status "$name" "$ns" "Failed" "Failed to create Velero Backup '$backup_name'"
          return 1
        fi
      fi

      # ── Poll Velero backup phase ──────────────────────────────
      local backup_phase
      backup_phase=$(kubectl get backup "$backup_name" -n velero \
        -o jsonpath='{.status.phase}' 2>/dev/null || echo "New")

      case "$backup_phase" in
        Completed)
          log_info "[$name] Backup '$backup_name' completed successfully"
          delete_reader_pod "$pod_name" "$ns" "backup completed"
          cleanup_vm_yaml "$name" "$ns"
          patch_status "$name" "$ns" "Completed" \
            "Backup '$backup_name' completed; reader pod removed"
          ;;
        Failed|PartiallyFailed)
          print_velero_errors "$backup_name"
          delete_reader_pod "$pod_name" "$ns" "backup $backup_phase"
          cleanup_vm_yaml "$name" "$ns"
          local velero_err
          velero_err=$(kubectl get backup "$backup_name" -n velero \
            -o jsonpath='{.status.failureReason}' 2>/dev/null || echo "see velero logs")
          patch_status "$name" "$ns" "Failed" \
            "Backup '$backup_name' ${backup_phase}: ${velero_err}"
          ;;
        *)
          log_info "[$name] Backup '$backup_name' in progress (phase: ${backup_phase:-New})"
          ;;
      esac
    }

    # ── Main loop ────────────────────────────────────────────────
    log_info "VMPVCBackup controller started (poll interval: ${POLL_INTERVAL}s)"

    while true; do
      # ── Backup reconciliation ─────────────────────────────────
      while IFS= read -r line; do
        [[ -z "$line" ]] && continue
        ns=$(awk '{print $1}' <<< "$line")
        nm=$(awk '{print $2}' <<< "$line")
        reconcile "$nm" "$ns" \
          || log_warn "Reconcile non-zero for '$nm'/'$ns' — will retry next cycle"
      done < <(kubectl get vmpvcbackups --all-namespaces \
        -o custom-columns=NS:.metadata.namespace,NAME:.metadata.name \
        --no-headers 2>/dev/null)

      # ── Restore assist — fix stuck reader pods ────────────────
      fix_stuck_restore_pods

      # ── Orphan sweep ──────────────────────────────────────────
      cleanup_orphaned_reader_pods

      sleep "$POLL_INTERVAL"
    done

---
# ============================================================
# 4. Controller Deployment
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmb
  namespace: velero
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vmb
  template:
    metadata:
      labels:
        app: vmb
    spec:
      serviceAccountName: vmb
      containers:
      - name: controller
        image: bitnami/kubectl:latest
        command: ["/bin/bash", "/scripts/controller.sh"]
        volumeMounts:
        - name: script
          mountPath: /scripts
      volumes:
      - name: script
        configMap:
          name: vmb-script
          defaultMode: 0755