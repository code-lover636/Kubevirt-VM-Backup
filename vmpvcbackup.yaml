# ============================================================
# 1. CRD — VMPVCBackup
# ============================================================
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: vmpvcbackups.backup.kubevirt.io
spec:
  group: backup.kubevirt.io
  names:
    kind: VMPVCBackup
    listKind: VMPVCBackupList
    plural: vmpvcbackups
    singular: vmpvcbackup
    shortNames: [vmpb]
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        required: [spec]
        properties:
          spec:
            type: object
            required: [vmName, backupName]
            properties:
              vmName:
                type: string
                description: Name of the VirtualMachine
              backupName:
                type: string
                description: Name to give the Velero backup
              osType:
                type: string
                enum: [linux, windows]
                default: linux
                description: OS type — determines reader pod image and mount paths
          status:
            type: object
            properties:
              phase:
                type: string
                enum: [Pending, BackingUp, Completed, Failed]
              readerPodName:
                type: string
              targetNode:
                type: string
              veleroBackupName:
                type: string
              discoveredPVCs:
                type: string
              message:
                type: string
              progress:
                type: string
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Pod
      type: string
      jsonPath: .status.readerPodName
    - name: Node
      type: string
      jsonPath: .status.targetNode
    - name: PVCs
      type: string
      jsonPath: .status.discoveredPVCs
    - name: Backup
      type: string
      jsonPath: .status.veleroBackupName
    - name: Progress
      type: string
      jsonPath: .status.progress
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp

---
# ============================================================
# 2. RBAC
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vmb
  namespace: velero

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vmb
rules:
- apiGroups: [backup.kubevirt.io]
  resources: [vmpvcbackups]
  verbs: [get, list, watch]
- apiGroups: [backup.kubevirt.io]
  resources: [vmpvcbackups/status]
  verbs: [update, patch]
- apiGroups: [""]
  resources: [pods]
  verbs: [get, list, create, delete, watch]
- apiGroups: [""]
  resources: [persistentvolumeclaims, configmaps]
  verbs: [get, list, create, delete, watch, update, patch]
- apiGroups: [kubevirt.io]
  resources: [virtualmachines, virtualmachineinstances]
  verbs: [get, list]
- apiGroups: [cdi.kubevirt.io]
  resources: [datavolumes]
  verbs: [get, list, patch, update]
- apiGroups: [velero.io]
  resources: [backups, podvolumebackups]
  verbs: [get, list, watch, create]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vmb
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vmb
subjects:
- kind: ServiceAccount
  name: vmb
  namespace: velero

---
# ============================================================
# 3. Controller Script
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: vmb-script
  namespace: velero
data:
  controller.sh: |
    #!/bin/bash
    set -uo pipefail

    POLL=20
    POD_TIMEOUT=300

    log() { echo "[$(date '+%Y-%m-%d %H:%M:%S')] [$1] $2"; }

    # ── Format bytes to human-readable ────────────────────────
    format_bytes() {
      local b=$1
      if [[ $b -ge 1073741824 ]]; then
        awk "BEGIN{printf \"%.1fGiB\", $b/1073741824}"
      elif [[ $b -ge 1048576 ]]; then
        awk "BEGIN{printf \"%.1fMiB\", $b/1048576}"
      elif [[ $b -ge 1024 ]]; then
        awk "BEGIN{printf \"%.0fKiB\", $b/1024}"
      else
        echo "${b}B"
      fi
    }

    # ── Get backup progress from PodVolumeBackups ─────────────
    get_backup_progress() {
      local backup=$1
      local pvb_list bytes_total=0 bytes_done=0 vols=0 active=0

      pvb_list=$(kubectl get podvolumebackups -n velero \
        -l "velero.io/backup-name=${backup}" \
        -o custom-columns=DONE:.status.progress.bytesDone,TOTAL:.status.progress.totalBytes,PHASE:.status.phase \
        --no-headers 2>/dev/null) || { echo "Initializing..."; return; }

      [[ -z "$pvb_list" ]] && { echo "Initializing..."; return; }

      while IFS= read -r line; do
        [[ -z "$line" ]] && continue
        local d t p
        d=$(awk '{print $1}' <<< "$line")
        t=$(awk '{print $2}' <<< "$line")
        p=$(awk '{print $3}' <<< "$line")
        [[ "$d" == "<none>" ]] && d=0
        [[ "$t" == "<none>" ]] && t=0
        bytes_done=$((bytes_done + d))
        bytes_total=$((bytes_total + t))
        vols=$((vols + 1))
        [[ "$p" == "InProgress" ]] && active=$((active + 1))
      done <<< "$pvb_list"

      local pct=0
      [[ $bytes_total -gt 0 ]] && pct=$((bytes_done * 100 / bytes_total))

      echo "$(format_bytes $bytes_done)/$(format_bytes $bytes_total) ${pct}% [${active}/${vols} vols active]"
    }

    # ── Update CR status ────────────────────────────────────────
    set_status() {
      local name=$1 ns=$2 phase=$3 msg=$4
      log "INFO" "[$name] → $phase: $msg"
      kubectl patch vmpvcbackup "$name" -n "$ns" \
        --subresource=status --type=merge \
        -p "{\"status\":{\"phase\":\"${phase}\",\"message\":\"${msg}\"}}" \
        || log "WARN" "[$name] status patch failed"
    }

    # ── Get PVCs attached to a VM ───────────────────────────────
    get_vm_pvcs() {
      local vm=$1 ns=$2
      local pvc_vols dv_vols
      pvc_vols=$(kubectl get vm "$vm" -n "$ns" \
        -o jsonpath='{.spec.template.spec.volumes[*].persistentVolumeClaim.claimName}' 2>/dev/null)
      dv_vols=$(kubectl get vm "$vm" -n "$ns" \
        -o jsonpath='{.spec.template.spec.volumes[*].dataVolume.name}' 2>/dev/null)
      echo "$pvc_vols $dv_vols" | tr ' ' '\n' | grep -v '^$' | sort -u | tr '\n' ' '
    }

    # ── Get node where VM is running ────────────────────────────
    get_vm_node() {
      local vm=$1 ns=$2
      kubectl get pods -n "$ns" \
        -l "vm.kubevirt.io/name=${vm}" \
        --field-selector=status.phase=Running \
        -o jsonpath='{.items[0].spec.nodeName}' 2>/dev/null
    }

    # ── Label PVCs and DataVolumes so Velero selects them ───────
    label_resources() {
      local label=$1 ns=$2; shift 2
      for pvc in "$@"; do
        kubectl label pvc "$pvc" -n "$ns" "vmpvcbackup-cr=${label}" --overwrite 2>/dev/null
        kubectl label datavolume "$pvc" -n "$ns" "vmpvcbackup-cr=${label}" --overwrite 2>/dev/null || true
      done
    }

    # ── Remove labels after backup ──────────────────────────────
    unlabel_resources() {
      local ns=$1; shift
      for pvc in "$@"; do
        kubectl label pvc "$pvc" -n "$ns" "vmpvcbackup-cr-" 2>/dev/null || true
        kubectl label datavolume "$pvc" -n "$ns" "vmpvcbackup-cr-" 2>/dev/null || true
      done
    }

    # ── Save VM YAML into a ConfigMap ───────────────────────────
    save_vm_configmap() {
      local vm=$1 ns=$2 label=$3
      local cm_name="vm-yaml-${label}"

      local vm_yaml
      vm_yaml=$(kubectl get vm "$vm" -n "$ns" -o yaml 2>/dev/null)
      if [[ -z "$vm_yaml" ]]; then
        log "WARN" "Could not export VM '$vm' YAML"
        return 1
      fi

      kubectl create configmap "$cm_name" -n "$ns" \
        --from-literal=vm.yaml="$vm_yaml" \
        --dry-run=client -o yaml \
      | kubectl label --local -o yaml -f - \
          "vmpvcbackup-cr=${label}" \
          "vmpvcbackup-vm-export=true" \
      | kubectl apply -f -
      log "INFO" "VM YAML saved to ConfigMap '$cm_name'"
    }

    # ── Delete ConfigMap after backup ───────────────────────────
    delete_vm_configmap() {
      local label=$1 ns=$2
      kubectl delete configmap "vm-yaml-${label}" -n "$ns" --ignore-not-found 2>/dev/null
    }

    # ── Create the reader pod ───────────────────────────────────
    create_reader_pod() {
      local pod=$1 ns=$2 os=$3 node=$4; shift 4
      local pvcs=("$@")

      # Build backup-volumes annotation: disk1,disk2,...
      local bv="" i
      for ((i=1; i<=${#pvcs[@]}; i++)); do
        [[ -n "$bv" ]] && bv+=","
        bv+="disk${i}"
      done

      # Build volumeMounts and volumes YAML
      local mounts="" vols=""
      for ((i=0; i<${#pvcs[@]}; i++)); do
        local n=$((i+1))
        local mp="/data${n}"
        [[ "$os" == "windows" ]] && mp="C:/data${n}"
        mounts+="    - name: disk${n}"$'\n'
        mounts+="      mountPath: ${mp}"$'\n'
        vols+="  - name: disk${n}"$'\n'
        vols+="    persistentVolumeClaim:"$'\n'
        vols+="      claimName: ${pvcs[$i]}"$'\n'
      done

      local image='ubuntu:22.04' cmd='["sleep","infinity"]' priv="true"
      local ns_block=""
      if [[ "$os" == "windows" ]]; then
        image='mcr.microsoft.com/windows/servercore:ltsc2022'
        cmd='["powershell","-Command","while($true){Start-Sleep -Seconds 3600}"]'
        priv="false"
        ns_block="  nodeSelector:"$'\n'"    kubernetes.io/os: windows"
      fi

      kubectl apply -f - <<EOF
    apiVersion: v1
    kind: Pod
    metadata:
      name: ${pod}
      namespace: ${ns}
      labels:
        app: vmpvcbackup-reader
        vmpvcbackup-cr: "${pod}"
      annotations:
        backup.velero.io/backup-volumes: ${bv}
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - "${node}"
    ${ns_block}
      containers:
      - name: reader
        image: ${image}
        command: ${cmd}
        securityContext:
          privileged: ${priv}
        volumeMounts:
    ${mounts}
      volumes:
    ${vols}
    EOF
    }

    # ── Wait for pod to be Running ──────────────────────────────
    wait_pod_running() {
      local pod=$1 ns=$2 elapsed=0
      while true; do
        local phase
        phase=$(kubectl get pod "$pod" -n "$ns" -o jsonpath='{.status.phase}' 2>/dev/null || echo "Unknown")
        [[ "$phase" == "Running" ]] && return 0
        [[ "$phase" == "Failed" || "$phase" == "Error" ]] && return 1
        [[ $elapsed -ge $POD_TIMEOUT ]] && return 1
        sleep 5; elapsed=$((elapsed+5))
      done
    }

    # ── Create Velero Backup ────────────────────────────────────
    create_velero_backup() {
      local backup=$1 ns=$2 label=$3
      kubectl apply -f - <<EOF
    apiVersion: velero.io/v1
    kind: Backup
    metadata:
      name: ${backup}
      namespace: velero
    spec:
      includedNamespaces:
      - ${ns}
      includedResources:
      - namespaces
      - pods
      - persistentvolumeclaims
      - persistentvolumes
      - configmaps
      - datavolumes
      orLabelSelectors:
      - matchLabels:
          vmpvcbackup-cr: "${label}"
      defaultVolumesToFsBackup: true
      snapshotVolumes: false
    EOF
    }

    # ── Full cleanup: pod + configmap + labels ──────────────────
    cleanup() {
      local pod=$1 ns=$2; shift 2
      local pvcs=("$@")
      kubectl delete pod "$pod" -n "$ns" --ignore-not-found --grace-period=30 --wait=false 2>/dev/null
      delete_vm_configmap "$pod" "$ns"
      unlabel_resources "$ns" "${pvcs[@]}"
      log "INFO" "[$pod] Cleanup done"
    }

    # ── Monitor backup progress until completion ──────────────
    monitor_backup() {
      local name=$1 ns=$2 backup=$3 pod=$4; shift 4
      local pvcs=("$@")

      log "INFO" "[$name] Monitoring backup '$backup' (polling every 5s)"

      while true; do
        local bp
        bp=$(kubectl get backup "$backup" -n velero \
          -o jsonpath='{.status.phase}' 2>/dev/null || echo "New")

        case "$bp" in
          Completed)
            local progress
            progress=$(get_backup_progress "$backup")
            cleanup "$pod" "$ns" "${pvcs[@]}"
            kubectl patch vmpvcbackup "$name" -n "$ns" \
              --subresource=status --type=merge \
              -p "{\"status\":{\"phase\":\"Completed\",\"message\":\"Backup completed\",\"progress\":\"${progress} - done\"}}" \
              2>/dev/null || true
            log "INFO" "[$name] Backup completed — $progress"
            return 0
            ;;
          Failed|PartiallyFailed)
            cleanup "$pod" "$ns" "${pvcs[@]}"
            local err
            err=$(kubectl get backup "$backup" -n velero \
              -o jsonpath='{.status.failureReason}' 2>/dev/null || echo "see velero logs")
            set_status "$name" "$ns" "Failed" "Backup failed: $err"
            return 1
            ;;
          *)
            local progress
            progress=$(get_backup_progress "$backup")
            kubectl patch vmpvcbackup "$name" -n "$ns" \
              --subresource=status --type=merge \
              -p "{\"status\":{\"phase\":\"BackingUp\",\"message\":\"Uploading volumes\",\"progress\":\"${progress}\"}}" \
              2>/dev/null || true
            log "INFO" "[$name] Progress: $progress"
            ;;
        esac

        sleep 5
      done
    }

    # ════════════════════════════════════════════════════════════
    # RECONCILE — one CR at a time
    # ════════════════════════════════════════════════════════════
    reconcile() {
      local name=$1 ns=$2

      # ── Skip if already terminal ──────────────────────────────
      local phase
      phase=$(kubectl get vmpvcbackup "$name" -n "$ns" \
        -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
      [[ "$phase" == "Completed" || "$phase" == "Failed" ]] && return 0

      # ── Read spec ─────────────────────────────────────────────
      local vm backup_name os_type
      vm=$(kubectl get vmpvcbackup "$name" -n "$ns" -o jsonpath='{.spec.vmName}' 2>/dev/null)
      backup_name=$(kubectl get vmpvcbackup "$name" -n "$ns" -o jsonpath='{.spec.backupName}' 2>/dev/null)
      os_type=$(kubectl get vmpvcbackup "$name" -n "$ns" -o jsonpath='{.spec.osType}' 2>/dev/null)
      os_type=${os_type:-linux}

      if [[ -z "$vm" || -z "$backup_name" ]]; then
        set_status "$name" "$ns" "Failed" "vmName or backupName missing in spec"
        return 1
      fi

      local pod="reader-${name}"
      local pvcs_raw pvcs
      pvcs_raw=$(get_vm_pvcs "$vm" "$ns")
      pvcs=($pvcs_raw)

      # ── If Velero backup already exists → just track its result ─
      if kubectl get backup "$backup_name" -n velero &>/dev/null; then
        local bp
        bp=$(kubectl get backup "$backup_name" -n velero \
          -o jsonpath='{.status.phase}' 2>/dev/null || echo "New")

        case "$bp" in
          Completed)
            cleanup "$pod" "$ns" "${pvcs[@]}"
            set_status "$name" "$ns" "Completed" "Backup '$backup_name' completed"
            ;;
          Failed|PartiallyFailed)
            cleanup "$pod" "$ns" "${pvcs[@]}"
            local err
            err=$(kubectl get backup "$backup_name" -n velero \
              -o jsonpath='{.status.failureReason}' 2>/dev/null || echo "see velero logs")
            set_status "$name" "$ns" "Failed" "Backup '$backup_name' failed: $err"
            ;;
          *)
            # Backup still in progress — monitor with live progress
            monitor_backup "$name" "$ns" "$backup_name" "$pod" "${pvcs[@]}"
            ;;
        esac
        return 0
      fi

      # ═══════════════════════════════════════════════════════════
      # BACKUP DOES NOT EXIST YET — full pipeline starts here
      # ═══════════════════════════════════════════════════════════

      # ── Verify VM exists ──────────────────────────────────────
      if ! kubectl get vm "$vm" -n "$ns" &>/dev/null; then
        set_status "$name" "$ns" "Failed" "VM '$vm' not found"
        return 1
      fi

      # ── Discover PVCs ─────────────────────────────────────────
      if [[ ${#pvcs[@]} -eq 0 ]]; then
        set_status "$name" "$ns" "Failed" "No PVCs found on VM '$vm'"
        return 1
      fi
      log "INFO" "[$name] PVCs: ${pvcs[*]}"

      # ── Discover node ─────────────────────────────────────────
      local node
      node=$(get_vm_node "$vm" "$ns")
      if [[ -z "$node" ]]; then
        set_status "$name" "$ns" "Pending" "Waiting for VM '$vm' to be running"
        return 0
      fi
      log "INFO" "[$name] VM running on node '$node'"

      # ── Always delete old reader pod first ────────────────────
      # Ensures PVC list is fresh (user may have added volumes
      # since the last backup attempt or a previous failed run).
      if kubectl get pod "$pod" -n "$ns" &>/dev/null; then
        log "INFO" "[$pod] Deleting stale reader pod to pick up current PVCs"
        kubectl delete pod "$pod" -n "$ns" --ignore-not-found --grace-period=0 --force 2>/dev/null
        sleep 3
      fi

      # ── Update CR status with discovered info ─────────────────
      kubectl patch vmpvcbackup "$name" -n "$ns" \
        --subresource=status --type=merge \
        -p "{\"status\":{\"readerPodName\":\"${pod}\",\"targetNode\":\"${node}\",\"veleroBackupName\":\"${backup_name}\",\"discoveredPVCs\":\"${pvcs[*]}\"}}" \
        || true

      # ── Step 1: Create reader pod ─────────────────────────────
      set_status "$name" "$ns" "Pending" "Creating reader pod with ${#pvcs[@]} PVCs"
      if ! create_reader_pod "$pod" "$ns" "$os_type" "$node" "${pvcs[@]}"; then
        set_status "$name" "$ns" "Failed" "Could not create reader pod"
        return 1
      fi

      # ── Step 2: Wait for pod Running ──────────────────────────
      log "INFO" "[$pod] Waiting for pod to be Running (timeout ${POD_TIMEOUT}s)"
      if ! wait_pod_running "$pod" "$ns"; then
        set_status "$name" "$ns" "Failed" "Reader pod not running — kubectl describe pod $pod -n $ns"
        kubectl delete pod "$pod" -n "$ns" --ignore-not-found 2>/dev/null
        return 1
      fi
      log "INFO" "[$pod] Running on $(kubectl get pod "$pod" -n "$ns" -o jsonpath='{.spec.nodeName}')"

      # ── Step 3: Label PVCs and DataVolumes ────────────────────
      label_resources "$pod" "$ns" "${pvcs[@]}"
      log "INFO" "[$name] Labeled ${#pvcs[@]} PVCs/DVs for backup"

      # ── Step 4: Save VM YAML as ConfigMap ─────────────────────
      save_vm_configmap "$vm" "$ns" "$pod"

      # ── Step 5: Create Velero Backup ──────────────────────────
      if ! create_velero_backup "$backup_name" "$ns" "$pod"; then
        cleanup "$pod" "$ns" "${pvcs[@]}"
        set_status "$name" "$ns" "Failed" "Could not create Velero Backup"
        return 1
      fi
      set_status "$name" "$ns" "BackingUp" "Velero backup '$backup_name' triggered"
      log "INFO" "[$name] Backup '$backup_name' created — monitoring progress"

      # ── Step 6: Monitor backup until completion ─────────────
      monitor_backup "$name" "$ns" "$backup_name" "$pod" "${pvcs[@]}"
    }

    # ── Orphan sweep — delete reader pods with no active CR ─────
    cleanup_orphans() {
      local list
      list=$(kubectl get pods --all-namespaces \
        -l app=vmpvcbackup-reader \
        -o custom-columns=NS:.metadata.namespace,NAME:.metadata.name \
        --no-headers 2>/dev/null) || return 0
      [[ -z "$list" ]] && return 0

      while IFS= read -r line; do
        [[ -z "$line" ]] && continue
        local pns pname cr
        pns=$(awk '{print $1}' <<< "$line")
        pname=$(awk '{print $2}' <<< "$line")
        cr="${pname#reader-}"
        local cp
        cp=$(kubectl get vmpvcbackup "$cr" -n "$pns" \
          -o jsonpath='{.status.phase}' 2>/dev/null || echo "NotFound")
        if [[ "$cp" == "Completed" || "$cp" == "Failed" || "$cp" == "NotFound" ]]; then
          log "WARN" "[$pname] Orphan (CR '$cr' is '$cp') — deleting"
          kubectl delete pod "$pname" -n "$pns" --ignore-not-found --grace-period=30 2>/dev/null
        fi
      done <<< "$list"
    }

    # ── Main loop ────────────────────────────────────────────────
    log "INFO" "VMPVCBackup controller started (poll: ${POLL}s)"

    while true; do
      while IFS= read -r line; do
        [[ -z "$line" ]] && continue
        ns=$(awk '{print $1}' <<< "$line")
        nm=$(awk '{print $2}' <<< "$line")
        reconcile "$nm" "$ns" || true
      done < <(kubectl get vmpvcbackups --all-namespaces \
        -o custom-columns=NS:.metadata.namespace,NAME:.metadata.name \
        --no-headers 2>/dev/null)

      cleanup_orphans
      sleep "$POLL"
    done

---
# ============================================================
# 4. Controller Deployment
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmb
  namespace: velero
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vmb
  template:
    metadata:
      labels:
        app: vmb
    spec:
      serviceAccountName: vmb
      containers:
      - name: controller
        image: bitnami/kubectl:latest
        command: ["/bin/bash", "/scripts/controller.sh"]
        volumeMounts:
        - name: script
          mountPath: /scripts
      volumes:
      - name: script
        configMap:
          name: vmb-script
          defaultMode: 0755