# CRD is placed in crds/ so Helm installs it before all other templates.
# Note: files in crds/ are NOT templated — values cannot be used here.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: vmpvcbackups.backup.kubevirt.io
spec:
  group: backup.kubevirt.io
  names:
    kind: VMPVCBackup
    listKind: VMPVCBackupList
    plural: vmpvcbackups
    singular: vmpvcbackup
    shortNames: [vmpb]
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        required: [spec]
        properties:
          spec:
            type: object
            required: [pvcs, backupName]
            properties:
              pvcs:
                type: array
                description: List of PVC names to mount and back up
                items:
                  type: string
              backupName:
                type: string
                description: Name to give the Velero backup
              veleroNamespace:
                type: string
                default: velero
                description: Namespace where Velero is installed
              osType:
                type: string
                enum: [linux, windows]
                default: linux
                description: OS type — determines reader pod image and mount paths
          status:
            type: object
            properties:
              phase:
                type: string
                enum: [Pending, CreatingPod, WaitingForPod, BackingUp, Completed, Failed]
              readerPodName:
                type: string
              veleroBackupName:
                type: string
              message:
                type: string
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Pod
      type: string
      jsonPath: .status.readerPodName
    - name: Backup
      type: string
      jsonPath: .status.veleroBackupName
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
